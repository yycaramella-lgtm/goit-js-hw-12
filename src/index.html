<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Search</title>

  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <main class="main">
    <div class="container">
      <form class="form">
        <input class="search-input" type="text" name="searchText" placeholder="Search images..." autocomplete="off" />

        <button class="search-btn" type="submit">
          Search
        </button>
      </form>

      <ul class="gallery"></ul>

      <button class="load-more" type="button">
        Load more
      </button>

      <div class="loader">
        <p class="loader-text">Loading images...</p>
      </div>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>

</html>
